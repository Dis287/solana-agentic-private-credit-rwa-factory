<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic RWA Factory Demo</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
    textarea { width: 100%; height: 120px; padding: 12px; font-size: 16px; }
    button { padding: 12px 24px; font-size: 16px; background: #00ff9d; border: none; border-radius: 8px; cursor: pointer; }
    #output { margin-top: 20px; padding: 20px; background: #111; color: #0f0; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🧠 Agentic Private Credit RWA Factory Demo</h1>
  <p>Type a command and see the swarm in action (simulated on SDP devnet):</p>
  
  <textarea id="input" placeholder="Tokenize my $50K freelance invoices as RWAs. Create a 12% yield lending pool..."></textarea>
  <br><br>
  <button onclick="runSwarm()">🚀 Run Swarm</button>
  
  <div id="output"></div>

  <script>
    async function runSwarm() {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      output.innerHTML = 'Thinking... Agents spinning up on Solana SDP...';

      // Simulated swarm response (will connect to real swarm.py later)
      setTimeout(() => {
        output.innerHTML = `✅ Swarm executed successfully!\n\n` +
          `📋 Planner: Structured the deal\n` +
          `✅ Compliance: GENIUS + KYC passed\n` +
          `🏦 Issuance: Tokenized ${input} as RWA via SDP\n` +
          `💰 Payments: 12% yield pool created with stablecoin flows\n` +
          `📈 Monitor: 24/7 tracking active\n\n` +
          `🔗 Your RWA is live on Solana devnet!\n` +
          `Next step: Apply to SDP waitlist → https://platform.solana.com`;
      }, 1500);
    }
  </script>
</body>
</html>
